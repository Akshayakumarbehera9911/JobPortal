<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobPortal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #F5F5F0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 12px;
    }
    .logo { font-family: Georgia, serif; font-size: 1.6rem; color: #111; }
    .logo span { color: #E8398A; }
    .sub { font-size: 0.82rem; color: #888; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #E8E3DC;
      border-top-color: #E8398A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .manual { display: none; flex-direction: column; align-items: center; gap: 10px; margin-top: 8px; }
    .manual.visible { display: flex; }
    .btn { padding: 10px 28px; border-radius: 999px; border: none; font-size: 0.88rem; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-block; text-align: center; }
    .btn-pink { background: #E8398A; color: #fff; }
    .btn-outline { background: transparent; border: 1.5px solid #E8398A; color: #E8398A; }
    .hint { font-size: 0.72rem; color: #aaa; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="logo">Job<span>Portal</span></div>
  <div class="sub">Redirecting you to the right version…</div>
  <div class="spinner" id="spinner"></div>

  <div class="manual" id="manual">
    <div class="sub">Choose your version:</div>
    <a class="btn btn-pink"    href="https://jobportal-mobile.onrender.com" id="mobileBtn">📱 Mobile App</a>
    <a class="btn btn-outline" href="https://jobportal-q9ii.onrender.com" id="desktopBtn">🖥️ Desktop Web</a>
    <div class="hint">You can always switch later from the app</div>
  </div>

  <script>
    // ── Update these two URLs after Render deployment ──
    var MOBILE_URL  = "https://jobportal-mobile.onrender.com";
    var DESKTOP_URL = "https://jobportal-q9ii.onrender.com";
    // ──────────────────────────────────────────────────

    function isMobileDevice() {
      var uaMobile   = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
      var smallScreen = window.innerWidth < 768;
      var hasTouch    = ("ontouchstart" in window) || (navigator.maxTouchPoints > 0);
      return uaMobile || (smallScreen && hasTouch);
    }

    window.location.replace(isMobileDevice() ? MOBILE_URL : DESKTOP_URL);

    // Fallback manual buttons if redirect stalls (3s)
    setTimeout(function () {
      document.getElementById("spinner").style.display = "none";
      document.getElementById("manual").classList.add("visible");
    }, 3000);
  </script>
</body>
</html>
